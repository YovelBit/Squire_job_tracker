services:
  db:
    image: postgres:16
    container_name: squire-db
    environment:
      POSTGRES_USER: squire
      POSTGRES_PASSWORD: squire
      POSTGRES_DB: squire
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U squire"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: squire-app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.local      # <- for JWT, DATABASE_URL, etc.
    volumes:
      - .:/usr/src/app
    working_dir: /usr/src/app
    command: bash -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    tty: true
    stdin_open: true

volumes:
  pgdata:
